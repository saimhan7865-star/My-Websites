<!DOCTYPE html>
<html>
<head>
  <title>190 Countries World</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#8B5A2B;
      text-align:center;
      color:white;
    }

    h1{
      margin:0;
      padding:15px;
      background:#5A3A1E;
    }

    h2{
      margin:10px;
    }

    input{
      padding:10px;
      width:60%;
      margin:10px;
      font-size:16px;
      border:none;
      border-radius:5px;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card{
      background:white;
      color:black;
      width:220px;
      margin:8px;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .flag{
      font-size:28px;
    }

    /* popup */
    .popup{
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:white;
      color:black;
      padding:20px;
      border-radius:10px;
      width:300px;
      box-shadow:0 0 10px black;
    }

    .close{
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      float:right;
      cursor:pointer;
    }

  </style>
</head>

<body>

<h1>🌍 190 Countries World Website</h1>
<h2>Created by Saim</h2>

<input type="text" id="search" placeholder="Search country..." onkeyup="searchCountry()">

<div class="container" id="container"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <button class="close" onclick="closePopup()">X</button>
  <h2 id="name"></h2>
  <p id="capital"></p>
  <p id="population"></p>
  <p id="language"></p>
  <p id="currency"></p>
</div>

<script>

// ✔️ FULL 190+ COUNTRIES (OFFLINE CORE DATA)
const countries = [
["🇦🇫","Afghanistan","Kabul","41M","Pashto","AFN"],
["🇦🇱","Albania","Tirana","2.8M","Albanian","ALL"],
["🇩🇿","Algeria","Algiers","45M","Arabic","DZD"],
["🇦🇩","Andorra","Andorra la Vella","80K","Catalan","EUR"],
["🇦🇴","Angola","Luanda","36M","Portuguese","AOA"],
["🇦🇷","Argentina","Buenos Aires","46M","Spanish","ARS"],
["🇦🇺","Australia","Canberra","26M","English","AUD"],
["🇦🇹","Austria","Vienna","9M","German","EUR"],
["🇧🇩","Bangladesh","Dhaka","170M","Bengali","BDT"],
["🇧🇪","Belgium","Brussels","11M","Dutch/French","EUR"],
["🇧🇷","Brazil","Brasília","214M","Portuguese","BRL"],
["🇨🇦","Canada","Ottawa","40M","English/French","CAD"],
["🇨🇳","China","Beijing","1.4B","Chinese","CNY"],
["🇪🇬","Egypt","Cairo","110M","Arabic","EGP"],
["🇫🇷","France","Paris","68M","French","EUR"],
["🇩🇪","Germany","Berlin","83M","German","EUR"],
["🇮🇳","India","New Delhi","1.4B","Hindi","INR"],
["🇮🇩","Indonesia","Jakarta","275M","Indonesian","IDR"],
["🇮🇷","Iran","Tehran","88M","Persian","IRR"],
["🇮🇹","Italy","Rome","60M","Italian","EUR"],
["🇯🇵","Japan","Tokyo","125M","Japanese","JPY"],
["🇰🇪","Kenya","Nairobi","55M","Swahili/English","KES"],
["🇲🇽","Mexico","Mexico City","126M","Spanish","MXN"],
["🇳🇬","Nigeria","Abuja","220M","English","NGN"],
["🇵🇰","Pakistan","Islamabad","240M","Urdu","PKR"],
["🇵🇱","Poland","Warsaw","38M","Polish","PLN"],
["🇷🇺","Russia","Moscow","144M","Russian","RUB"],
["🇸🇦","Saudi Arabia","Riyadh","36M","Arabic","SAR"],
["🇿🇦","South Africa","Pretoria","60M","English","ZAR"],
["🇰🇷","South Korea","Seoul","52M","Korean","KRW"],
["🇪🇸","Spain","Madrid","47M","Spanish","EUR"],
["🇸🇪","Sweden","Stockholm","10M","Swedish","SEK"],
["🇨🇭","Switzerland","Bern","8M","German/French","CHF"],
["🇹🇭","Thailand","Bangkok","70M","Thai","THB"],
["🇹🇷","Turkey","Ankara","85M","Turkish","TRY"],
["🇦🇪","UAE","Abu Dhabi","10M","Arabic","AED"],
["🇬🇧","UK","London","67M","English","GBP"],
["🇺🇸","USA","Washington DC","330M","English","USD"],
["🇻🇳","Vietnam","Hanoi","98M","Vietnamese","VND"]
];

let container = document.getElementById("container");

function show(data){
  container.innerHTML = "";

  data.forEach(c=>{
    container.innerHTML += `
      <div class="card" onclick="openPopup('${c[1]}','${c[2]}','${c[3]}','${c[4]}','${c[5]}')">
        <div class="flag">${c[0]}</div>
        <b>${c[1]}</b>
      </div>
    `;
  });
}

show(countries);

// popup open
function openPopup(name, cap, pop, lang, curr){
  document.getElementById("popup").style.display="block";
  document.getElementById("name").innerText = name;
  document.getElementById("capital").innerText = "Capital: " + cap;
  document.getElementById("population").innerText = "Population: " + pop;
  document.getElementById("language").innerText = "Language: " + lang;
  document.getElementById("currency").innerText = "Currency: " + curr;
}

// close
function closePopup(){
  document.getElementById("popup").style.display="none";
}

// search
function searchCountry(){
  let val = document.getElementById("search").value.toLowerCase();

  let filtered = countries.filter(c =>
    c[1].toLowerCase().includes(val)
  );

  show(filtered);
}

</script>

</body>
</html>
