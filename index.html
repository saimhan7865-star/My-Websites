<!DOCTYPE html>
<html>
<head>
  <title>World Countries</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;

      background-image:url("https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg");
      background-size:cover;
      background-attachment:fixed;
    }

    body::before{
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    h1{
      margin:0;
      padding:15px;
      background:#5A3A1E;
      text-align:center;
    }

    h3{
      text-align:center;
      margin:5px;
    }

    input{
      display:block;
      margin:10px auto;
      padding:10px;
      width:60%;
      border:none;
      border-radius:5px;
      font-size:16px;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card{
      background:white;
      color:black;
      width:200px;
      margin:8px;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
      text-align:center;
      transition:0.2s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .flag{
      font-size:30px;
    }

    .popup{
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:white;
      color:black;
      padding:15px;
      border-radius:10px;
      width:320px;
      box-shadow:0 0 10px black;
      text-align:left;
    }

    .close{
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      float:right;
      cursor:pointer;
    }

  </style>
</head>

<body>

<h1>🌍 World Countries Explorer</h1>
<h3>Created by Saim</h3>

<input type="text" id="search" placeholder="Search country..." onkeyup="searchCountry()">

<div class="container" id="container"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <button class="close" onclick="closePopup()">X</button>

  <h2 id="name"></h2>
  <p id="capital"></p>
  <p id="population"></p>
  <p id="language"></p>
  <p id="currency"></p>
</div>

<script>

/* 🌍 50+ COUNTRIES DATA */
const countries = [
["🇵🇰 Pakistan","Islamabad","240M","Urdu","PKR"],
["🇮🇳 India","New Delhi","1.4B","Hindi","INR"],
["🇺🇸 USA","Washington DC","330M","English","USD"],
["🇬🇧 UK","London","67M","English","GBP"],
["🇨🇳 China","Beijing","1.4B","Chinese","CNY"],
["🇯🇵 Japan","Tokyo","125M","Japanese","JPY"],
["🇩🇪 Germany","Berlin","83M","German","EUR"],
["🇫🇷 France","Paris","68M","French","EUR"],
["🇧🇷 Brazil","Brasília","214M","Portuguese","BRL"],
["🇷🇺 Russia","Moscow","144M","Russian","RUB"],
["🇹🇷 Turkey","Ankara","85M","Turkish","TRY"],
["🇮🇹 Italy","Rome","60M","Italian","EUR"],
["🇪🇸 Spain","Madrid","47M","Spanish","EUR"],
["🇨🇦 Canada","Ottawa","40M","English/French","CAD"],
["🇦🇺 Australia","Canberra","26M","English","AUD"],
["🇸🇦 Saudi Arabia","Riyadh","36M","Arabic","SAR"],
["🇮🇩 Indonesia","Jakarta","275M","Indonesian","IDR"],
["🇲🇽 Mexico","Mexico City","126M","Spanish","MXN"],
["🇪🇬 Egypt","Cairo","110M","Arabic","EGP"],
["🇳🇬 Nigeria","Abuja","220M","English","NGN"],
["🇧🇩 Bangladesh","Dhaka","170M","Bengali","BDT"],
["🇿🇦 South Africa","Pretoria","60M","English","ZAR"],
["🇻🇳 Vietnam","Hanoi","98M","Vietnamese","VND"],
["🇹🇭 Thailand","Bangkok","70M","Thai","THB"],
["🇵🇭 Philippines","Manila","115M","Filipino","PHP"],
["🇲🇾 Malaysia","Kuala Lumpur","33M","Malay","MYR"],
["🇮🇷 Iran","Tehran","88M","Persian","IRR"],
["🇮🇶 Iraq","Baghdad","44M","Arabic","IQD"],
["🇺🇦 Ukraine","Kyiv","41M","Ukrainian","UAH"],
["🇵🇱 Poland","Warsaw","38M","Polish","PLN"],
["🇳🇱 Netherlands","Amsterdam","17M","Dutch","EUR"],
["🇧🇪 Belgium","Brussels","11M","Dutch/French","EUR"],
["🇸🇪 Sweden","Stockholm","10M","Swedish","SEK"],
["🇳🇴 Norway","Oslo","5M","Norwegian","NOK"],
["🇨🇭 Switzerland","Bern","8M","German/French","CHF"],
["🇬🇷 Greece","Athens","10M","Greek","EUR"],
["🇵🇹 Portugal","Lisbon","10M","Portuguese","EUR"],
["🇰🇷 South Korea","Seoul","52M","Korean","KRW"],
["🇸🇬 Singapore","Singapore","6M","English","SGD"]
];

let container = document.getElementById("container");

function show(data){
  container.innerHTML = "";

  data.forEach(c=>{
    container.innerHTML += `
      <div class="card" onclick="openPopup('${c[0]}','${c[1]}','${c[2]}','${c[3]}','${c[4]}')">
        <div class="flag">${c[0].split(" ")[0]}</div>
        <b>${c[0].split(" ")[1] || c[0]}</b>
      </div>
    `;
  });
}

show(countries);

function openPopup(name,cap,pop,lang,curr){
  document.getElementById("popup").style.display="block";

  document.getElementById("name").innerText = name;
  document.getElementById("capital").innerText = "Capital: " + cap;
  document.getElementById("population").innerText = "Population: " + pop;
  document.getElementById("language").innerText = "Language: " + lang;
  document.getElementById("currency").innerText = "Currency: " + curr;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function searchCountry(){
  let val = document.getElementById("search").value.toLowerCase();

  let filtered = countries.filter(c =>
    c[0].toLowerCase().includes(val)
  );

  show(filtered);
}

</script>

</body>
</html>
