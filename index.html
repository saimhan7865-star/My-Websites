<!DOCTYPE html>
<html>
<head>
  <title>World Countries</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      color:white;

      background-image:url("https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg");
      background-size:cover;
      background-attachment:fixed;
    }

    body::before{
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    h1{
      margin:0;
      padding:15px;
      background:#5A3A1E;
      text-align:center;
    }

    h3{
      text-align:center;
      margin:5px;
    }

    input{
      display:block;
      margin:10px auto;
      padding:10px;
      width:60%;
      border:none;
      border-radius:5px;
      font-size:16px;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card{
      background:white;
      color:black;
      width:200px;
      margin:8px;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
      text-align:center;
      transition:0.2s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .flag{
      font-size:30px;
    }

    .popup{
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:white;
      color:black;
      padding:15px;
      border-radius:10px;
      width:320px;
      box-shadow:0 0 10px black;
      text-align:left;
    }

    .close{
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      float:right;
      cursor:pointer;
    }

  </style>
</head>

<body>

let container = document.getElementById("container");

function show(data){
  container.innerHTML = "";

  data.forEach(c=>{
    container.innerHTML += `
      <div class="card" onclick="openPopup('${c[0]}','${c[1]}','${c[2]}','${c[3]}','${c[4]}')">
        <div class="flag">${c[0].split(" ")[0]}</div>
        <b>${c[0].split(" ")[1] || c[0]}</b>
      </div>
    `;
  });
}

show(countries);

function openPopup(name,cap,pop,lang,curr){
  document.getElementById("popup").style.display="block";

  document.getElementById("name").innerText = name;
  document.getElementById("capital").innerText = "Capital: " + cap;
  document.getElementById("population").innerText = "Population: " + pop;
  document.getElementById("language").innerText = "Language: " + lang;
  document.getElementById("currency").innerText = "Currency: " + curr;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function searchCountry(){
  let val = document.getElementById("search").value.toLowerCase();

  let filtered = countries.filter(c =>
    c[0].toLowerCase().includes(val)
  );

  show(filtered);
}
