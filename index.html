<!DOCTYPE html>
<html>
<head>
  <title>World 206 Countries</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      color:white;

      background-image:url("https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg");
      background-size:cover;
      background-attachment:fixed;
      text-align:center;
    }

    body::before{
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    h1{
      margin:0;
      padding:15px;
      background:#5A3A1E;
    }

    h3{
      margin:5px;
    }

    input{
      padding:10px;
      width:60%;
      margin:10px;
      font-size:16px;
      border:none;
      border-radius:5px;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card{
      background:white;
      color:black;
      width:200px;
      margin:8px;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
    }

    .popup{
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:white;
      color:black;
      padding:15px;
      border-radius:10px;
      width:320px;
      box-shadow:0 0 10px black;
    }

    .close{
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      float:right;
      cursor:pointer;
    }

  </style>
</head>

<body>

<h1>🌍 World 206 Countries</h1>
<h3>Created by Saim</h3>

<input type="text" id="search" placeholder="Search country..." onkeyup="searchCountry()">

<div class="container" id="container"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <button class="close" onclick="closePopup()">X</button>

  <h2 id="name"></h2>
  <p id="capital"></p>
  <p id="population"></p>
  <p id="language"></p>
  <p id="currency"></p>
  <p id="sport"></p>
  <p id="provinces"></p>
</div>

<script>

/* 🌍 SAMPLE WORKING FULL STRUCTURE (EXPANDABLE TO 206) */
const countries = [
["Pakistan","Islamabad","240M","Urdu","PKR","Hockey","4"],
["India","New Delhi","1.4B","Hindi","INR","Cricket","28"],
["USA","Washington DC","330M","English","USD","American Football","50"],
["UK","London","67M","English","GBP","Football","4"],
["China","Beijing","1.4B","Chinese","CNY","Table Tennis","23"],
["Japan","Tokyo","125M","Japanese","JPY","Sumo","47"],
["Germany","Berlin","83M","German","EUR","Football","16"],
["France","Paris","68M","French","EUR","Football","18"],
["Brazil","Brasília","214M","Portuguese","BRL","Football","26"],
["Russia","Moscow","144M","Russian","RUB","Ice Hockey","85"],
["Turkey","Ankara","85M","Turkish","TRY","Wrestling","81"],
["Italy","Rome","60M","Italian","EUR","Football","20"],
["Spain","Madrid","47M","Spanish","EUR","Football","17"],
["Canada","Ottawa","40M","English/French","CAD","Ice Hockey","10"],
["Australia","Canberra","26M","English","AUD","Cricket","6"],
["Saudi Arabia","Riyadh","36M","Arabic","SAR","Football","13"],
["Indonesia","Jakarta","275M","Indonesian","IDR","Badminton","34"],
["Mexico","Mexico City","126M","Spanish","MXN","Football","32"],
["Egypt","Cairo","110M","Arabic","EGP","Football","27"],
["Nigeria","Abuja","220M","English","NGN","Football","36"],
["Bangladesh","Dhaka","170M","Bengali","BDT","Cricket","8"],
["South Africa","Pretoria","60M","English","ZAR","Rugby","9"],
["Vietnam","Hanoi","98M","Vietnamese","VND","Football","58"],
["Thailand","Bangkok","70M","Thai","THB","Muay Thai","76"],
["Philippines","Manila","115M","Filipino","PHP","Basketball","17"],
["Malaysia","Kuala Lumpur","33M","Malay","MYR","Badminton","13"]
];

let container = document.getElementById("container");

function show(data){
  container.innerHTML = "";

  data.forEach(c=>{
    container.innerHTML += `
      <div class="card" onclick="openPopup('${c[0]}','${c[1]}','${c[2]}','${c[3]}','${c[4]}','${c[5]}','${c[6]}')">
        <b>${c[0]}</b>
      </div>
    `;
  });
}

show(countries);

function openPopup(name,cap,pop,lang,curr,sport,prov){
  document.getElementById("popup").style.display="block";

  document.getElementById("name").innerText = name;
  document.getElementById("capital").innerText = "Capital: " + cap;
  document.getElementById("population").innerText = "Population: " + pop;
  document.getElementById("language").innerText = "Language: " + lang;
  document.getElementById("currency").innerText = "Currency: " + curr;
  document.getElementById("sport").innerText = "Sport: " + sport;
  document.getElementById("provinces").innerText = "Provinces: " + prov;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function searchCountry(){
  let val = document.getElementById("search").value.toLowerCase();

  let filtered = countries.filter(c =>
    c[0].toLowerCase().includes(val)
  );

  show(filtered);
}

</script>

</body>
</html>
