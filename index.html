<!DOCTYPE html>
<html>
<head>
  <title>World Countries</title>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#f2f2f2;
    }

    h1{
      margin-top:20px;
    }

    input{
      padding:10px;
      width:60%;
      font-size:16px;
      margin:15px 0;
    }

    table{
      margin:auto;
      width:95%;
      background:white;
      border-collapse:collapse;
    }

    th, td{
      border:1px solid #ddd;
      padding:10px;
    }

    th{
      background:#4CAF50;
      color:white;
    }

    img{
      width:30px;
    }
  </style>
</head>

<body>

<h1>🌍 Welcome to World Countries Website</h1>
<h2>Created by Saim</h2>

<input type="text" id="search" placeholder="Search country..." onkeyup="searchCountry()">

<table id="table">
  <tr>
    <th>Flag</th>
    <th>Country</th>
    <th>Capital</th>
    <th>Population</th>
    <th>Language</th>
    <th>Currency</th>
  </tr>
</table>

<script>

async function loadCountries(){

  const res = await fetch("https://restcountries.com/v3.1/all");
  const data = await res.json();

  let table = document.getElementById("table");

  data.forEach(country => {

    let name = country.name.common;
    let capital = country.capital ? country.capital[0] : "N/A";
    let population = country.population.toLocaleString();
    let flag = country.flags.png;

    let language = "N/A";
    if(country.languages){
      language = Object.values(country.languages)[0];
    }

    let currency = "N/A";
    if(country.currencies){
      currency = Object.values(country.currencies)[0].name;
    }

    let row = table.insertRow();

    row.innerHTML = `
      <td><img src="${flag}"></td>
      <td>${name}</td>
      <td>${capital}</td>
      <td>${population}</td>
      <td>${language}</td>
      <td>${currency}</td>
    `;
  });
}

loadCountries();

function searchCountry(){
  let input = document.getElementById("search").value.toLowerCase();
  let rows = document.getElementById("table").getElementsByTagName("tr");

  for(let i=1;i<rows.length;i++){
    let country = rows[i].cells[1].innerText.toLowerCase();
    rows[i].style.display = country.includes(input) ? "" : "none";
  }
}

</script>

</body>
</html>
