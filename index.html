<!DOCTYPE html>
<html>
<head>
  <title>World Countries Lite</title>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#f2f2f2;
      margin:0;
    }

    h1{
      background:#4CAF50;
      color:white;
      padding:15px;
      margin:0;
    }

    input{
      padding:10px;
      width:60%;
      margin:15px;
      font-size:16px;
    }

    table{
      width:95%;
      margin:auto;
      background:white;
      border-collapse:collapse;
    }

    th, td{
      border:1px solid #ddd;
      padding:8px;
      font-size:13px;
    }

    th{
      background:#4CAF50;
      color:white;
    }
  </style>
</head>

<body>

<h1>🌍 World Countries (Lite Version)</h1>

<input type="text" id="search" placeholder="Search country..." onkeyup="searchCountry()">

<table id="table">
  <tr>
    <th>Country</th>
    <th>Capital</th>
    <th>Population</th>
    <th>Language</th>
    <th>Currency</th>
  </tr>
</table>

<script>

// ✔️ STATIC DATA (NO API = LOW INTERNET)
const countries = [
["Pakistan","Islamabad","240M","Urdu","PKR"],
["India","New Delhi","1.4B","Hindi","INR"],
["USA","Washington DC","330M","English","USD"],
["UK","London","67M","English","GBP"],
["Saudi Arabia","Riyadh","36M","Arabic","SAR"],
["China","Beijing","1.4B","Chinese","CNY"],
["Japan","Tokyo","125M","Japanese","JPY"],
["Germany","Berlin","83M","German","EUR"],
["France","Paris","68M","French","EUR"],
["Italy","Rome","60M","Italian","EUR"],
["Canada","Ottawa","40M","English/French","CAD"],
["Australia","Canberra","26M","English","AUD"],
["Brazil","Brasilia","214M","Portuguese","BRL"],
["Russia","Moscow","144M","Russian","RUB"],
["South Korea","Seoul","52M","Korean","KRW"],
["Turkey","Ankara","85M","Turkish","TRY"],
["Indonesia","Jakarta","275M","Indonesian","IDR"],
["Mexico","Mexico City","126M","Spanish","MXN"],
["Egypt","Cairo","110M","Arabic","EGP"],
["Bangladesh","Dhaka","170M","Bengali","BDT"]
];

let table = document.getElementById("table");

countries.forEach(c=>{
  let row = table.insertRow();
  row.innerHTML = `
    <td>${c[0]}</td>
    <td>${c[1]}</td>
    <td>${c[2]}</td>
    <td>${c[3]}</td>
    <td>${c[4]}</td>
  `;
});

function searchCountry(){
  let input = document.getElementById("search").value.toLowerCase();
  let rows = document.getElementsByTagName("tr");

  for(let i=1;i<rows.length;i++){
    let country = rows[i].cells[0].innerText.toLowerCase();
    rows[i].style.display = country.includes(input) ? "" : "none";
  }
}

</script>

</body>
</html>
