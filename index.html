    body{
      font-family: Arial;

      color:white;
    }

    h1{
      margin:0;
      padding:15px;
      background:#5A3A1E;
    }

      padding:10px;
      width:60%;
      margin:10px;
      font-size:16px;
      border:none;
      border-radius:5px;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card{
      background:white;
      color:black;
      width:200px;
      margin:8px;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .popup{
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:white;
      color:black;
      padding:20px;
      border-radius:10px;
      width:300px;
      box-shadow:0 0 10px black;
    }

    .close{
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      float:right;
      cursor:pointer;
    }

  </style>
</head>

let container = document.getElementById("container");

function show(data){
  container.innerHTML = "";
  data.forEach(c=>{
    container.innerHTML += `
      <div class="card" onclick="openPopup('${c[0]}','${c[1]}','${c[2]}','${c[3]}','${c[4]}')">
        <b>${c[0]}</b>
      </div>
    `;
  });
}

show(countries);

function openPopup(name, cap, pop, lang, curr){
  document.getElementById("popup").style.display="block";
  document.getElementById("name").innerText = name;
  document.getElementById("capital").innerText = "Capital: " + cap;
  document.getElementById("population").innerText = "Population: " + pop;
  document.getElementById("language").innerText = "Language: " + lang;
  document.getElementById("currency").innerText = "Currency: " + curr;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function searchCountry(){
  let val = document.getElementById("search").value.toLowerCase();
  let filtered = countries.filter(c => c[0].toLowerCase().includes(val));
  show(filtered);
}
