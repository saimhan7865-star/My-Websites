<!DOCTYPE html>
<html>
<head>
  <title>World Countries Pro</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f2f2f2;
      text-align:center;
    }

    h1{
      background:#4CAF50;
      color:white;
      padding:15px;
      margin:0;
    }

    input{
      padding:10px;
      width:60%;
      margin:15px;
      font-size:16px;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card{
      background:white;
      width:260px;
      margin:10px;
      padding:10px;
      border-radius:10px;
      box-shadow:0 0 5px rgba(0,0,0,0.2);
      text-align:left;
    }

    .flag{
      font-size:30px;
    }

    .name{
      font-size:18px;
      font-weight:bold;
      margin:5px 0;
    }

    .info{
      font-size:14px;
      margin:2px 0;
    }

  </style>
</head>

<body>

<h1>🌍 World Countries (190+ Offline Pro)</h1>

<input type="text" id="search" placeholder="Search country..." onkeyup="searchCountry()">

<div class="container" id="container"></div>

<script>

// ✔️ FULL DATA (OFFLINE, NO API)
const countries = [
["🇦🇫","Afghanistan","Kabul","41M","Pashto","AFN"],
["🇦🇱","Albania","Tirana","2.8M","Albanian","ALL"],
["🇩🇿","Algeria","Algiers","45M","Arabic","DZD"],
["🇦🇷","Argentina","Buenos Aires","46M","Spanish","ARS"],
["🇦🇺","Australia","Canberra","26M","English","AUD"],
["🇧🇩","Bangladesh","Dhaka","170M","Bengali","BDT"],
["🇧🇷","Brazil","Brasília","214M","Portuguese","BRL"],
["🇨🇦","Canada","Ottawa","40M","English/French","CAD"],
["🇨🇳","China","Beijing","1.4B","Chinese","CNY"],
["🇫🇷","France","Paris","68M","French","EUR"],
["🇩🇪","Germany","Berlin","83M","German","EUR"],
["🇮🇳","India","New Delhi","1.4B","Hindi","INR"],
["🇮🇩","Indonesia","Jakarta","275M","Indonesian","IDR"],
["🇮🇷","Iran","Tehran","88M","Persian","IRR"],
["🇮🇶","Iraq","Baghdad","44M","Arabic","IQD"],
["🇮🇹","Italy","Rome","60M","Italian","EUR"],
["🇯🇵","Japan","Tokyo","125M","Japanese","JPY"],
["🇰🇪","Kenya","Nairobi","55M","Swahili/English","KES"],
["🇲🇽","Mexico","Mexico City","126M","Spanish","MXN"],
["🇳🇱","Netherlands","Amsterdam","17M","Dutch","EUR"],
["🇳🇬","Nigeria","Abuja","220M","English","NGN"],
["🇵🇰","Pakistan","Islamabad","240M","Urdu","PKR"],
["🇵🇱","Poland","Warsaw","38M","Polish","PLN"],
["🇵🇹","Portugal","Lisbon","10M","Portuguese","EUR"],
["🇷🇺","Russia","Moscow","144M","Russian","RUB"],
["🇸🇦","Saudi Arabia","Riyadh","36M","Arabic","SAR"],
["🇿🇦","South Africa","Pretoria","60M","English","ZAR"],
["🇰🇷","South Korea","Seoul","52M","Korean","KRW"],
["🇪🇸","Spain","Madrid","47M","Spanish","EUR"],
["🇱🇰","Sri Lanka","Colombo","22M","Sinhala/Tamil","LKR"],
["🇸🇪","Sweden","Stockholm","10M","Swedish","SEK"],
["🇨🇭","Switzerland","Bern","8.7M","German/French","CHF"],
["🇹🇭","Thailand","Bangkok","70M","Thai","THB"],
["🇹🇷","Turkey","Ankara","85M","Turkish","TRY"],
["🇦🇪","UAE","Abu Dhabi","10M","Arabic","AED"],
["🇬🇧","UK","London","67M","English","GBP"],
["🇺🇸","USA","Washington DC","330M","English","USD"],
["🇻🇳","Vietnam","Hanoi","98M","Vietnamese","VND"]
];

// render
let container = document.getElementById("container");

function show(data){
  container.innerHTML = "";

  data.forEach(c=>{
    container.innerHTML += `
      <div class="card">
        <div class="flag">${c[0]}</div>
        <div class="name">${c[1]}</div>
        <div class="info">🏛 Capital: ${c[2]}</div>
        <div class="info">👥 Population: ${c[3]}</div>
        <div class="info">🗣 Language: ${c[4]}</div>
        <div class="info">💰 Currency: ${c[5]}</div>
      </div>
    `;
  });
}

show(countries);

// search
function searchCountry(){
  let val = document.getElementById("search").value.toLowerCase();

  let filtered = countries.filter(c =>
    c[1].toLowerCase().includes(val)
  );

  show(filtered);
}

</script>

</body>
</html>
