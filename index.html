<!DOCTYPE html>
<html>
<head>
  <title>World Countries 190+</title>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#f2f2f2;
      margin:0;
    }

    h1{
      background:#4CAF50;
      color:white;
      padding:15px;
      margin:0;
    }

    input{
      padding:10px;
      width:60%;
      margin:15px;
      font-size:16px;
    }

    table{
      width:95%;
      margin:auto;
      background:white;
      border-collapse:collapse;
    }

    th, td{
      border:1px solid #ddd;
      padding:10px;
      font-size:14px;
    }

    th{
      background:#4CAF50;
      color:white;
    }

    img{
      width:30px;
    }
  </style>
</head>

<body>

<h1>🌍 190+ World Countries</h1>

<input type="text" id="search" placeholder="Search country..." onkeyup="searchCountry()">

<table id="table">
  <tr>
    <th>Flag</th>
    <th>Country</th>
    <th>Capital</th>
    <th>Population</th>
    <th>Language</th>
    <th>Currency</th>
  </tr>
</table>

<script>

async function loadCountries(){

  try{
    const res = await fetch("https://restcountries.com/v3.1/all");
    const data = await res.json();

    let table = document.getElementById("table");

    data.sort((a,b)=>a.name.common.localeCompare(b.name.common));

    data.forEach(c => {

      let name = c.name.common;
      let capital = c.capital ? c.capital[0] : "N/A";
      let population = c.population.toLocaleString();
      let flag = c.flags.png;

      let language = c.languages ? Object.values(c.languages)[0] : "N/A";
      let currency = c.currencies ? Object.values(c.currencies)[0].name : "N/A";

      let row = table.insertRow();

      row.innerHTML = `
        <td><img src="${flag}"></td>
        <td>${name}</td>
        <td>${capital}</td>
        <td>${population}</td>
        <td>${language}</td>
        <td>${currency}</td>
      `;
    });

  }catch(e){
    alert("Data load nahi ho raha. Internet check karo.");
  }
}

loadCountries();

function searchCountry(){
  let input = document.getElementById("search").value.toLowerCase();
  let rows = document.getElementById("table").getElementsByTagName("tr");

  for(let i=1;i<rows.length;i++){
    let country = rows[i].cells[1].innerText.toLowerCase();
    rows[i].style.display = country.includes(input) ? "" : "none";
  }
}

</script>

</body>
</html>
