<!DOCTYPE html>
<html>
<head>
  <title>World Map 50+ Countries</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body{
      margin:0;
      font-family:Arial;
      text-align:center;
      background:#111;
      color:white;
    }

    h1{
      margin:0;
      padding:12px;
      background:#5A3A1E;
    }

    #map{
      height:90vh;
      width:100%;
    }
  </style>
</head>

<body>

<h1>🌍 World Map (50+ Countries Data)</h1>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 6,
}).addTo(map);

/* 🌍 50+ COUNTRIES DATA */
const countryData = {
  "Pakistan": {capital:"Islamabad",pop:"240M",lang:"Urdu",curr:"PKR",sport:"Hockey"},
  "India": {capital:"New Delhi",pop:"1.4B",lang:"Hindi",curr:"INR",sport:"Cricket"},
  "USA": {capital:"Washington DC",pop:"330M",lang:"English",curr:"USD",sport:"American Football"},
  "UK": {capital:"London",pop:"67M",lang:"English",curr:"GBP",sport:"Football"},
  "China": {capital:"Beijing",pop:"1.4B",lang:"Chinese",curr:"CNY",sport:"Table Tennis"},
  "Japan": {capital:"Tokyo",pop:"125M",lang:"Japanese",curr:"JPY",sport:"Sumo"},
  "Germany": {capital:"Berlin",pop:"83M",lang:"German",curr:"EUR",sport:"Football"},
  "France": {capital:"Paris",pop:"68M",lang:"French",curr:"EUR",sport:"Football"},
  "Italy": {capital:"Rome",pop:"60M",lang:"Italian",curr:"EUR",sport:"Football"},
  "Spain": {capital:"Madrid",pop:"47M",lang:"Spanish",curr:"EUR",sport:"Football"},

  "Brazil": {capital:"Brasília",pop:"214M",lang:"Portuguese",curr:"BRL",sport:"Football"},
  "Russia": {capital:"Moscow",pop:"144M",lang:"Russian",curr:"RUB",sport:"Ice Hockey"},
  "Canada": {capital:"Ottawa",pop:"40M",lang:"English/French",curr:"CAD",sport:"Ice Hockey"},
  "Australia": {capital:"Canberra",pop:"26M",lang:"English",curr:"AUD",sport:"Cricket"},

  "Saudi Arabia": {capital:"Riyadh",pop:"36M",lang:"Arabic",curr:"SAR",sport:"Football"},
  "Turkey": {capital:"Ankara",pop:"85M",lang:"Turkish",curr:"TRY",sport:"Wrestling"},
  "Indonesia": {capital:"Jakarta",pop:"275M",lang:"Indonesian",curr:"IDR",sport:"Badminton"},
  "Mexico": {capital:"Mexico City",pop:"126M",lang:"Spanish",curr:"MXN",sport:"Football"},
  "Egypt": {capital:"Cairo",pop:"110M",lang:"Arabic",curr:"EGP",sport:"Football"},

  "Nigeria": {capital:"Abuja",pop:"220M",lang:"English",curr:"NGN",sport:"Football"},
  "Bangladesh": {capital:"Dhaka",pop:"170M",lang:"Bengali",curr:"BDT",sport:"Cricket"},
  "South Africa": {capital:"Pretoria",pop:"60M",lang:"English",curr:"ZAR",sport:"Rugby"},
  "Vietnam": {capital:"Hanoi",pop:"98M",lang:"Vietnamese",curr:"VND",sport:"Football"},
  "Thailand": {capital:"Bangkok",pop:"70M",lang:"Thai",curr:"THB",sport:"Muay Thai"},

  "Philippines": {capital:"Manila",pop:"115M",lang:"Filipino",curr:"PHP",sport:"Basketball"},
  "Malaysia": {capital:"Kuala Lumpur",pop:"33M",lang:"Malay",curr:"MYR",sport:"Badminton"},
  "Pakistan": {capital:"Islamabad",pop:"240M",lang:"Urdu",curr:"PKR",sport:"Hockey"},
  "Iran": {capital:"Tehran",pop:"88M",lang:"Persian",curr:"IRR",sport:"Wrestling"},
  "Iraq": {capital:"Baghdad",pop:"44M",lang:"Arabic",curr:"IQD",sport:"Football"},

  "Afghanistan": {capital:"Kabul",pop:"41M",lang:"Pashto",curr:"AFN",sport:"Cricket"},
  "Ukraine": {capital:"Kyiv",pop:"41M",lang:"Ukrainian",curr:"UAH",sport:"Football"},
  "Poland": {capital:"Warsaw",pop:"38M",lang:"Polish",curr:"PLN",sport:"Football"},
  "Netherlands": {capital:"Amsterdam",pop:"17M",lang:"Dutch",curr:"EUR",sport:"Football"},
  "Belgium": {capital:"Brussels",pop:"11M",lang:"Dutch/French",curr:"EUR",sport:"Football"},

  "Sweden": {capital:"Stockholm",pop:"10M",lang:"Swedish",curr:"SEK",sport:"Ice Hockey"},
  "Norway": {capital:"Oslo",pop:"5M",lang:"Norwegian",curr:"NOK",sport:"Football"},
  "Switzerland": {capital:"Bern",pop:"8M",lang:"German/French",curr:"CHF",sport:"Football"},
  "Greece": {capital:"Athens",pop:"10M",lang:"Greek",curr:"EUR",sport:"Football"},
  "Portugal": {capital:"Lisbon",pop:"10M",lang:"Portuguese",curr:"EUR",sport:"Football"}
};

function popup(name){
  let info = countryData[name];

  if(info){
    L.popup()
    .setLatLng(map.getCenter())
    .setContent(`
      <b>${name}</b><br><br>
      Capital: ${info.capital}<br>
      Population: ${info.pop}<br>
      Language: ${info.lang}<br>
      Currency: ${info.curr}<br>
      Sport: ${info.sport}
    `)
    .openOn(map);
  } else {
    alert("No data available for " + name);
  }
}

/* 🌍 REAL MAP */
fetch("https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson")
.then(res => res.json())
.then(data => {

  L.geoJSON(data, {
    style:{
      color:"white",
      weight:1,
      fillColor:"green",
      fillOpacity:0.2
    },

    onEachFeature:function(feature,layer){

      layer.on("click", function(){
        popup(feature.properties.ADMIN);
      });

    }
  }).addTo(map);

});

</script>

</body>
</html>
